<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
</head>
<body>
    <ul id="container"></ul>
    <aside id="pokeDetContainer"></aside>

    <script defer>
        const url="https://pokeapi.co/api/v2/pokemon?limit=11&offset=51"
        async function getPoke() {
            const res = await fetch(url);
            const data = await res.json();
            displayResults(data.results);
        }

        function displayResults(results){
            const pokeBowl = document.querySelector("#container");
            console.log(results);
            for(mon of results) {
                const pokemonItem = `<div class="Box">
                        <div class="PokeIMG">IMG</div>
                        <h2 id="${mon.name}" slot="${mon.url}">${mon.name}</h2>
                    </div>`;
                pokeBowl.innerHTML += pokemonItem;
            }  
            let pokeList = document.querySelectorAll("h2");
            console.log(pokeList);
            pokeList.forEach(element => {
                element.addEventListener("click", (e) => {
                    getIndividualOne(e.target.slot);
                })
            });
        }

        getPoke(url);
        
        async function getIndividualOne(url){
            const res = await fetch(url);
            const one = await res.json();
            console.log(one);
        }

    </script>

    <style>

        .Box{
            display: flex;
            flex-direction: column;
            justify-content: end;
            align-items: baseline;
            height: 300px;
            width: 200px;
            padding: 5px;
            margin: 3px;
            border: 3px solid black;
            border-radius: 6px;
        }
        .Box h2{
            display: flex;
            width: stretch;
            margin: 5px;
            border: 1px solid black;
            text-transform: capitalize;
        }

        .Box > .PokeIMG{
            height: stretch;
            width: stretch;
            margin: 5px;
            border: 1px solid black;
        }

        #container{
            display: grid;
            grid: auto-flow / 1fr 1fr 1fr;
            flex-wrap: wrap;
            border: 4px solid black;
        }

        #pokeDetContainer{
            display: flex;
        }
    </style>
</body>
</html>
